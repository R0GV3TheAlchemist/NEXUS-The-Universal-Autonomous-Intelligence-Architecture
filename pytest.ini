# This file intentionally contains only a [pytest] header so that pytest
# recognises pyproject.toml as the authoritative config source.
#
# ALL pytest settings live in [tool.pytest.ini_options] in pyproject.toml:
#   - pythonpath = [".", "src-python"]   ← fixes ModuleNotFoundError for
#       affect_engine, crystal, shadow_engine, sovereign_memory
#   - asyncio_mode = "auto"
#   - asyncio_default_fixture_loop_scope = "session"
#   - timeout = 60
#
# Previously this file was empty with a comment claiming pyproject.toml
# takes precedence — that is incorrect. When pytest.ini exists (even empty),
# pytest uses it as the config root and ignores [tool.pytest.ini_options]
# entirely. The fix is to keep this file absent OR use a bare [pytest] marker
# that does not set any keys, so pytest falls through to pyproject.toml.
#
# Do NOT add any [pytest] key=value settings here.
[pytest]
