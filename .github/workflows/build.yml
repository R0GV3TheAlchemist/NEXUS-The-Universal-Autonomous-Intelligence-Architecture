name: 🔨 Build

on:
  push:
    branches: [main]
    paths:
      - 'src-tauri/**'
      - 'src/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src-tauri/**'
      - 'src/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - '.github/workflows/build.yml'

jobs:

  # ── 1. Build Python sidecar (Linux only for CI) ───────────────────────────
  build-sidecar:
    name: Sidecar (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Install Linux system deps
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev

      - name: Build gaia-backend sidecar
        run: pyinstaller gaia-backend.spec

      - name: Stage sidecar with triple name
        run: |
          dest="src-tauri/binaries/gaia-backend-x86_64-unknown-linux-gnu"
          cp dist/gaia-backend "$dest"
          chmod +x "$dest"
          echo "Staged: $(wc -c < $dest) bytes"

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-x86_64-unknown-linux-gnu
          path: src-tauri/binaries/gaia-backend-x86_64-unknown-linux-gnu


  # ── 2. Build Tauri app (Linux only for CI) ─────────────────────────────
  # macOS + Windows are built only on tagged releases (release.yml)
  build-tauri:
    name: Tauri (Linux)
    needs: build-sidecar
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Node deps
        run: pnpm install --no-frozen-lockfile

      - name: Build frontend (Vite)
        run: pnpm run build

      - name: Download sidecar
        uses: actions/download-artifact@v4
        with:
          name: sidecar-x86_64-unknown-linux-gnu
          path: src-tauri/binaries/

      - name: Mark sidecar executable
        run: chmod +x src-tauri/binaries/gaia-backend-x86_64-unknown-linux-gnu

      - name: Install Pillow & regenerate icons
        run: pip install Pillow
        shell: bash

      - name: Regenerate icons
        shell: python
        run: |
          import os, struct
          from io import BytesIO
          from PIL import Image

          icons = "src-tauri/icons"
          src = Image.open(f"{icons}/Square150x150Logo.png").convert("RGBA")
          print(f"Source: {src.size} {src.mode}")

          def make_png(size):
              buf = BytesIO()
              src.resize((size, size), Image.LANCZOS).save(buf, format="PNG")
              return buf.getvalue()

          for filename, size in {
              "32x32.png": 32,
              "128x128.png": 128,
              "128x128@2x.png": 256,
              "icon.png": 512,
          }.items():
              data = make_png(size)
              open(f"{icons}/{filename}", "wb").write(data)
              print(f"  {filename}: {len(data)} bytes")

          ico_sizes = [16, 24, 32, 48, 64, 128, 256]
          frames = [make_png(s) for s in ico_sizes]
          n = len(ico_sizes)
          header = struct.pack("<HHH", 0, 1, n)
          entries = b""
          offset = 6 + 16 * n
          for s, f in zip(ico_sizes, frames):
              w = s if s < 256 else 0
              entries += struct.pack("<BBBBHHII", w, w, 0, 0, 1, 32, len(f), offset)
              offset += len(f)
          ico_path = f"{icons}/icon.ico"
          with open(ico_path, "wb") as out:
              out.write(header + entries)
              for f in frames: out.write(f)
          print(f"icon.ico: {os.path.getsize(ico_path)} bytes")

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri bundles
        timeout-minutes: 55
        run: pnpm tauri build --target x86_64-unknown-linux-gnu --bundles deb,rpm

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundle-linux
          path: |
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/**/*.deb
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/**/*.rpm
          if-no-files-found: warn
