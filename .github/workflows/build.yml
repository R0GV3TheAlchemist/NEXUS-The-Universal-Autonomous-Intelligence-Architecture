name: 🔨 Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── 1. Build Python sidecar for each platform ────────────────────────────────────
  build-sidecar:
    name: Sidecar (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            triple: x86_64-pc-windows-msvc
            ext: .exe
            copy_cmd: pwsh
          - name: macOS
            os: macos-latest
            triple: aarch64-apple-darwin
            ext: ""
            copy_cmd: bash
          - name: Linux
            os: ubuntu-latest
            triple: x86_64-unknown-linux-gnu
            ext: ""
            copy_cmd: bash

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev

      - name: Build gaia-backend sidecar
        run: pyinstaller gaia-backend.spec

      - name: Stage sidecar with triple name (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $dest = "src-tauri\binaries\gaia-backend-${{ matrix.triple }}.exe"
          Copy-Item dist\gaia-backend.exe $dest -Force
          Write-Host "Staged: $((Get-Item $dest).Length) bytes"

      - name: Stage sidecar with triple name (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          dest="src-tauri/binaries/gaia-backend-${{ matrix.triple }}"
          cp dist/gaia-backend "$dest"
          chmod +x "$dest"
          echo "Staged: $(wc -c < $dest) bytes"

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-${{ matrix.triple }}
          path: src-tauri/binaries/gaia-backend-${{ matrix.triple }}${{ matrix.ext }}


  # ── 2. Build Tauri app for each platform ─────────────────────────────────────
  build-tauri:
    name: Tauri (${{ matrix.name }})
    needs: build-sidecar
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            triple: x86_64-pc-windows-msvc
            ext: .exe
            rust_target: x86_64-pc-windows-msvc
            bundle_args: --target x86_64-pc-windows-msvc
            artifact_glob: "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.exe"
          - name: macOS
            os: macos-latest
            triple: aarch64-apple-darwin
            ext: ""
            rust_target: aarch64-apple-darwin
            bundle_args: --target aarch64-apple-darwin
            artifact_glob: "src-tauri/target/aarch64-apple-darwin/release/bundle/**/*.dmg"
          - name: Linux
            os: ubuntu-latest
            triple: x86_64-unknown-linux-gnu
            ext: ""
            rust_target: x86_64-unknown-linux-gnu
            bundle_args: --target x86_64-unknown-linux-gnu --bundles deb,rpm
            artifact_glob: "src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/**/*.{deb,rpm}"

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Node deps
        run: pnpm install --no-frozen-lockfile

      - name: Build frontend (Vite)
        run: pnpm run build

      - name: Download sidecar
        uses: actions/download-artifact@v4
        with:
          name: sidecar-${{ matrix.triple }}
          path: src-tauri/binaries/

      - name: Mark sidecar executable (Unix)
        if: matrix.os != 'windows-latest'
        run: chmod +x src-tauri/binaries/gaia-backend-${{ matrix.triple }}

      - name: Install Pillow & regenerate icons
        run: pip install Pillow
        shell: bash

      - name: Regenerate icons
        shell: python
        run: |
          import os, struct
          from io import BytesIO
          from PIL import Image

          icons = "src-tauri/icons"
          src = Image.open(f"{icons}/Square150x150Logo.png").convert("RGBA")
          print(f"Source: {src.size} {src.mode}")

          def make_png(size):
              buf = BytesIO()
              src.resize((size, size), Image.LANCZOS).save(buf, format="PNG")
              return buf.getvalue()

          for filename, size in {
              "32x32.png": 32,
              "128x128.png": 128,
              "128x128@2x.png": 256,
              "icon.png": 512,
          }.items():
              data = make_png(size)
              open(f"{icons}/{filename}", "wb").write(data)
              print(f"  {filename}: {len(data)} bytes")

          ico_sizes = [16, 24, 32, 48, 64, 128, 256]
          frames = [make_png(s) for s in ico_sizes]
          n = len(ico_sizes)
          header = struct.pack("<HHH", 0, 1, n)
          entries = b""
          offset = 6 + 16 * n
          for s, f in zip(ico_sizes, frames):
              w = s if s < 256 else 0
              entries += struct.pack("<BBBBHHII", w, w, 0, 0, 1, 32, len(f), offset)
              offset += len(f)
          ico_path = f"{icons}/icon.ico"
          with open(ico_path, "wb") as out:
              out.write(header + entries)
              for f in frames: out.write(f)
          print(f"icon.ico: {os.path.getsize(ico_path)} bytes")

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # On CI (push/PR to main): just build, no release creation
      - name: Build Tauri bundles
        timeout-minutes: 45
        run: pnpm tauri build ${{ matrix.bundle_args }}

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.triple }}
          path: |
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/**/*.rpm
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/**/*.AppImage
          if-no-files-found: warn
