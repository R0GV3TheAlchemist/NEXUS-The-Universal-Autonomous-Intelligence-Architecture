# =============================================================================
# GAIA OS — Continuous Integration
# =============================================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
  # cancel-in-progress is DISABLED. Previously set to true, which caused
  # autofix bot commits to cancel in-flight CI runs, making status invisible.

jobs:

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: lint-${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: lint-${{ runner.os }}-pip-
      - run: pip install --quiet ruff
      - run: ruff check .

  test:
    name: Test (pytest ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: test-${{ runner.os }}-py${{ matrix.python-version }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: test-${{ runner.os }}-py${{ matrix.python-version }}-pip-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx
      - name: Run tests with coverage
        env:
          GAIA_ROOT: /tmp/gaia-ci
          GAIA_REQUIRE_AUTH: "false"
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          pytest \
            --tb=short \
            --strict-markers \
            -q \
            --cov=core \
            --cov=server \
            --cov-branch \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80
      - name: Upload coverage XML
        if: matrix.python-version == '3.13'
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 3
