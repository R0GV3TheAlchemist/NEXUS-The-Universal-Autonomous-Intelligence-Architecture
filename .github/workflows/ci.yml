# GAIA-OS CI — runs on every push and PR targeting main
# Gate: py_compile (syntax) → pytest (correctness)
# Nothing merges to main unless this workflow is green.

name: GAIA-OS CI

on:
  push:
    branches: ["main", "sprint-g7/**", "feat/**", "fix/**"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test:
    name: Syntax check + Pytest
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ───────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── 3. Cache HuggingFace models ───────────────────────────────────────────────
      #    Prevents 429 rate-limit failures on HuggingFace Hub.
      #    Cache keyed to requirements.txt — busts only when deps change.
      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: huggingface-all-minilm-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            huggingface-all-minilm-

      # ── 4. Install dependencies ─────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install -e ".[dev]"
          pip install pytest-cov pytest-mock

      # ── 5. Pre-download embedding model ──────────────────────────────────────────
      #    Downloads all-MiniLM-L6-v2 once before tests run.
      #    On cache hit this is a no-op (model already on disk).
      #    On cache miss this runs once and populates the cache.
      #    Skips gracefully if sentence-transformers is not installed.
      - name: Pre-download HuggingFace embedding model
        run: |
          python -c "
          try:
              from sentence_transformers import SentenceTransformer
              print('Downloading all-MiniLM-L6-v2...')
              SentenceTransformer('sentence-transformers/all-MiniLM-L6-v2')
              print('Model ready.')
          except ImportError:
              print('sentence-transformers not installed — skipping pre-download.')
          except Exception as e:
              print(f'Pre-download failed (non-fatal): {e}')
          "
        env:
          HF_HUB_DOWNLOAD_TIMEOUT: "300"
          TRANSFORMERS_OFFLINE: "0"
          SENTENCE_TRANSFORMERS_HOME: ~/.cache/huggingface/sentence_transformers

      # ── 6. Syntax check ───────────────────────────────────────────────────────────
      - name: Syntax check (py_compile)
        run: |
          python -m compileall -q core/ 2>&1 | tee /tmp/compile.log
          if grep -q 'SyntaxError\|Error' /tmp/compile.log; then
            echo '::error::Syntax errors found in core/ — fix before merging'
            exit 1
          fi
          echo '\u2705  All core/ files compile cleanly'

      # ── 7. Pytest ────────────────────────────────────────────────────────────────
      #    PYTHONPATH is set explicitly here AND in pyproject.toml AND in
      #    conftest.py (self-healing). Triple-redundant so no branch config
      #    drift can ever break collection again.
      - name: Run pytest
        run: |
          python -m pytest tests/ \
            --tb=short \
            --asyncio-mode=auto \
            --cov=core \
            --cov-report=term-missing \
            -v
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/src-python
          CI: "true"
          HF_HUB_DOWNLOAD_TIMEOUT: "300"
          SENTENCE_TRANSFORMERS_HOME: ~/.cache/huggingface/sentence_transformers
