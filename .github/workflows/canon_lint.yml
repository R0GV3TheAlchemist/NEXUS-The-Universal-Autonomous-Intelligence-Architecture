name: Canon Registry Lint

on:
  push:
    paths:
      - 'canon/**'
      - 'canon/REGISTRY.json'
      - 'scripts/canon_lint.py'
  pull_request:
    paths:
      - 'canon/**'
      - 'canon/REGISTRY.json'
      - 'scripts/canon_lint.py'

jobs:
  lint-canon:
    name: Verify Canon Authority Registry
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Canon Linter
        run: python scripts/canon_lint.py
