name: Autofix Lint
# NOTE: This workflow checks and reports lint status — it does NOT push fixes.
# Autofix commits directly to main caused CI cancellation loops and prevented
# status from ever resolving. Developers fix locally; CI reports green or red.

on:
  push:
    branches: [main]
    paths:
      - '**.py'
  pull_request:
    branches: [main]
    paths:
      - '**.py'
  workflow_dispatch:

jobs:
  lint-check:
    name: Lint Check (ruff + black + isort)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install lint tools
        run: pip install ruff black isort

      - name: ruff check
        run: ruff check .

      - name: black check (format validation only)
        run: black --check --target-version py313 .

      - name: isort check
        run: isort --check-only .
        # All three steps report failures directly as CI status.
        # Fix locally with: ruff check --fix . && black . && isort .
