name: Auto-fix Ruff Lint

on:
  workflow_dispatch:

jobs:
  autofix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff --fix
        run: |
          ruff check core/ api/ gaia/ --fix --unsafe-fixes || true
          ruff check core/ api/ gaia/ --select E741 --fix || true

      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "fix(lint): auto-fix all ruff violations via ruff --fix"

      - name: Push
        run: git push
