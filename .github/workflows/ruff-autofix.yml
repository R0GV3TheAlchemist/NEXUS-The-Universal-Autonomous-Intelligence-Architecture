name: Ruff Autofix
# Runs on Pull Requests only to preserve free-plan Actions minutes.
# Fix locally with: ruff check --fix .

on:
  pull_request:
    branches: [main]
    paths:
      - '**.py'
  workflow_dispatch:

jobs:
  lint-check:
    name: Ruff Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check (report only — no push)
        run: ruff check .
