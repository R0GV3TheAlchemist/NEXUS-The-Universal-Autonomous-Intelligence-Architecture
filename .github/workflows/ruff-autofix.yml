name: Ruff Autofix
# Runs on Pull Requests only to preserve free-plan Actions minutes.
# Scoped to PR-changed .py files to avoid pre-existing repo-wide debt.
# Fix locally with: ruff check --fix .

on:
  pull_request:
    branches: [main]
    paths:
      - '**.py'
  workflow_dispatch:

jobs:
  lint-check:
    name: Ruff Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check (changed files only)
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD -- '*.py' | tr '\n' ' ')
          if [ -z "$CHANGED" ]; then
            echo "No Python files changed in this PR — ruff skipped."
            exit 0
          fi
          echo "Checking: $CHANGED"
          ruff check $CHANGED
