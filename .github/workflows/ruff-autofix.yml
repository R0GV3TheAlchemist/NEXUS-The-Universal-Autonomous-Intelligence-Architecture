name: Ruff Autofix
# NOTE: This workflow checks and reports lint status — it does NOT push fixes.
# Autofix commits directly to main caused CI cancellation loops and prevented
# status from ever resolving. Developers fix locally; CI reports green or red.

on:
  push:
    branches: [main]
    paths:
      - '**.py'
  pull_request:
    branches: [main]
    paths:
      - '**.py'
  workflow_dispatch:

jobs:
  lint-check:
    name: Ruff Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check (report only — no push)
        run: ruff check .
        # This step FAILS the job if there are lint errors.
        # That failure is visible as a red status check on the commit.
        # Fix lint issues locally with: ruff check --fix .
