name: Ruff Autofix

on:
  push:
    branches: [main]
    paths:
      - '**.py'
  pull_request:
    branches: [main]
    paths:
      - '**.py'
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff autofix
        run: ruff check --fix . || true

      - name: Commit fixes (skip if nothing changed)
        run: |
          git config user.name "gaia-autofix[bot]"
          git config user.email "gaia-autofix[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: ruff --fix autofix [skip ci]"
          git push
