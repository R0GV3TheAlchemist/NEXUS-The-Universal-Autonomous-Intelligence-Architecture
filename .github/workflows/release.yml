name: 🚀 Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:

  # ── 1. Build Python sidecar for each platform ─────────────────────────────
  build-sidecar:
    name: Sidecar (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            triple: x86_64-pc-windows-msvc
            ext: .exe
          - name: macOS
            os: macos-latest
            triple: aarch64-apple-darwin
            ext: ""
          - name: Linux
            os: ubuntu-latest
            triple: x86_64-unknown-linux-gnu
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build gaia-backend sidecar
        run: pyinstaller gaia-backend.spec --clean

      - name: Stage sidecar (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $dest = "src-tauri\binaries\gaia-backend-${{ matrix.triple }}.exe"
          Copy-Item dist\gaia-backend.exe $dest -Force
          Write-Host "Staged: $((Get-Item $dest).Length) bytes"

      - name: Stage sidecar (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          dest="src-tauri/binaries/gaia-backend-${{ matrix.triple }}"
          cp dist/gaia-backend "$dest"
          chmod +x "$dest"
          echo "Staged: $(wc -c < $dest) bytes"

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-${{ matrix.triple }}
          path: src-tauri/binaries/gaia-backend-${{ matrix.triple }}${{ matrix.ext }}
          retention-days: 1


  # ── 2. Build + publish Tauri release for each platform ────────────────────
  release:
    name: Release (${{ matrix.name }})
    needs: build-sidecar
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            triple: x86_64-pc-windows-msvc
            ext: .exe
            rust_target: x86_64-pc-windows-msvc
          - name: macOS
            os: macos-latest
            triple: aarch64-apple-darwin
            ext: ""
            rust_target: aarch64-apple-darwin
          - name: Linux
            os: ubuntu-latest
            triple: x86_64-unknown-linux-gnu
            ext: ""
            rust_target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller Pillow

      - name: Install Node dependencies
        run: npm install

      - name: Build frontend (Vite)
        run: npm run build

      - name: Download sidecar
        uses: actions/download-artifact@v4
        with:
          name: sidecar-${{ matrix.triple }}
          path: src-tauri/binaries/

      - name: Mark sidecar executable (Unix)
        if: matrix.os != 'windows-latest'
        run: chmod +x src-tauri/binaries/gaia-backend-${{ matrix.triple }}

      - name: Regenerate icons
        shell: python
        run: |
          import os, struct
          from io import BytesIO
          from PIL import Image

          icons = "src-tauri/icons"
          src = Image.open(f"{icons}/Square150x150Logo.png").convert("RGBA")

          def make_png(size):
              buf = BytesIO()
              src.resize((size, size), Image.LANCZOS).save(buf, format="PNG")
              return buf.getvalue()

          for filename, size in {
              "32x32.png": 32,
              "128x128.png": 128,
              "128x128@2x.png": 256,
              "icon.png": 512,
          }.items():
              open(f"{icons}/{filename}", "wb").write(make_png(size))

          ico_sizes = [16, 24, 32, 48, 64, 128, 256]
          frames = [make_png(s) for s in ico_sizes]
          n = len(ico_sizes)
          header = struct.pack("<HHH", 0, 1, n)
          entries = b""
          offset = 6 + 16 * n
          for s, f in zip(ico_sizes, frames):
              w = s if s < 256 else 0
              entries += struct.pack("<BBBBHHII", w, w, 0, 0, 1, 32, len(f), offset)
              offset += len(f)
          with open(f"{icons}/icon.ico", "wb") as out:
              out.write(header + entries)
              for f in frames: out.write(f)

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "GAIA ${{ github.ref_name }}"
          releaseBody: |
            See [CHANGELOG.md](https://github.com/R0GV3TheAlchemist/GAIA-OS/blob/main/CHANGELOG.md)
            for full release notes.
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          includeUpdaterJson: true
          args: --target ${{ matrix.rust_target }}
