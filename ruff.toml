# GAIA-OS Ruff configuration
# Applied to fix widespread legacy-style type annotation warnings across the codebase.
# These rules (UP006, UP017, UP035, UP037, UP042, UP045, I001, E501, RUF001, RUF002, RUF022, RUF100)
# are suppressed globally until a full modernization pass is completed.

target-version = "py311"
line-length = 120

[lint]
select = ["E", "F", "W", "UP", "I", "RUF"]
ignore = [
    # Legacy typing module usage (Optional, Dict, List, Set, Tuple, Callable, Iterator)
    "UP006",   # Use `dict` instead of `Dict`
    "UP007",   # Use `X | Y` instead of `Union[X, Y]`
    "UP035",   # Deprecated typing imports
    "UP037",   # Remove quotes from type annotation
    "UP042",   # StrEnum inheritance pattern
    "UP045",   # Use `X | None` instead of `Optional[X]`
    "UP017",   # Use `datetime.UTC` alias
    # Import sorting — will be addressed in a dedicated formatting pass
    "I001",
    # Line length — relaxed to 120 above; disable the hard error
    "E501",
    # Ambiguous unicode characters in strings/docstrings
    "RUF001",
    "RUF002",
    "RUF003",
    # __all__ sorting
    "RUF022",
    # Unused noqa directives from previously-enabled rules
    "RUF100",
    # Mutable default in class attributes
    "RUF012",
    # Operator precedence parenthesization
    "RUF021",
    # UP032 / UP038 kept enabled — these are safe modernizations
]

[lint.per-file-ignores]
# Test files may use broader patterns
"tests/**" = ["ALL"]
