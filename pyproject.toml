[tool.ruff.lint.mccabe]
# Default 10 → raised to 15. Soul-layer modules exempted further above.
max-complexity = 15

[tool.ruff.lint.isort]
known-first-party = ["core", "gaia", "api"]
split-on-trailing-comma = true
force-sort-within-sections = true

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false

[tool.setuptools.packages.find]
include = ["core*", "api*", "gaia*"]
