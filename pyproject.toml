[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "gaia-app"
version = "0.1.0"
description = "GAIA-APP Python core and canon runtime"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.110.0",
  "uvicorn[standard]>=0.29.0",
  "pydantic>=2.0.0",
  "python-dotenv>=1.0.0",
  "httpx>=0.27.0",
  "PyJWT>=2.8.0",
  "numpy>=1.26.0",
  "scipy>=1.13.0",
  "trafilatura>=1.8.0",
  "beautifulsoup4>=4.12.0",
  "lxml>=5.0.0",
  "openai>=1.20.0",
  "anthropic>=0.25.0"
]

[project.scripts]
gaia = "gaia.cli:main"

[project.optional-dependencies]
dev = [
  "pytest>=8.0.0",
  "pytest-asyncio>=0.23.6,<1.0",
  "pytest-timeout>=2.3.0",
  "pytest-mock>=3.14.0",
  "ruff>=0.5.0",
  "mypy>=1.10.0"
]
# Local/research only — do NOT install in CI (requires ~1-2 GB PyTorch)
ml = [
  "sentence-transformers>=2.2.0"
]

[tool.pytest.ini_options]
# ── Paths ──────────────────────────────────────────────────────────────────
pythonpath = [".", "src-python"]

# ── Async ──────────────────────────────────────────────────────────────────
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"

# ── Guards ─────────────────────────────────────────────────────────────────
timeout = 60

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.setuptools.packages.find]
include = ["core*", "api*", "gaia*"]
