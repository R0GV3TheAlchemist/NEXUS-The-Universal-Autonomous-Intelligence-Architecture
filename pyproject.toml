[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "gaia-app"
version = "0.1.0"
description = "GAIA-APP Python core and canon runtime"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.110.0",
  "uvicorn[standard]>=0.29.0",
  "pydantic>=2.0.0",
  "python-dotenv>=1.0.0",
  "httpx>=0.27.0",
  "PyJWT>=2.8.0",
  "numpy>=1.26.0",
  "scipy>=1.13.0",
  "trafilatura>=1.8.0",
  "beautifulsoup4>=4.12.0",
  "lxml>=5.0.0",
  "openai>=1.20.0",
  "anthropic>=0.25.0"
]

[project.scripts]
gaia = "gaia.cli:main"

[project.optional-dependencies]
dev = [
  "pytest>=8.0.0",
  "pytest-asyncio>=0.23.6,<1.0",
  "pytest-timeout>=2.3.0",
  "pytest-mock>=3.14.0",
  "ruff>=0.5.0",
  "mypy>=1.10.0",
  "pre-commit>=3.7.0"
]
# Local/research only — do NOT install in CI (requires ~1-2 GB PyTorch)
ml = [
  "sentence-transformers>=2.2.0"
]

[tool.pytest.ini_options]
# ── Paths ──────────────────────────────────────────────────────────────────
pythonpath = [".", "core", "src-python"]

# ── Async ──────────────────────────────────────────────────────────────────
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"

# ── Guards ─────────────────────────────────────────────────────────────────
timeout = 60

# ── Test discovery ─────────────────────────────────────────────────────────
testpaths = ["tests"]

# ============================================================================
# RUFF — Linter + Formatter
# Philosophy: signal over noise. Real bugs loud; style gentle; soul-layer free.
#
# FUTURE-PROOF NOTES (learned the hard way):
#   - ANN101/ANN102: self/cls annotation rules — REMOVED from ruff in 0.2.x.
#     Dropped from ignore list 2026-06-10 to silence "rule removed" warning.
#   - UP038: isinstance(x,(A,B)) → A|B — REMOVED from ruff in 0.4.x.
#     Dropped from ignore list 2026-06-10 to silence "rule removed" warning.
#   - UP006/007/035/045: typing modernisation — ignore until migration sprint
#   - F401: unused imports — ignored globally; many are conditional/re-exports
#   - PL rules added for pylint-equivalent checks (PLR complexity etc.)
#   - target-version py311 = matches CI runtime (python-version: "3.11")
#   - preview = false (stable rules only) — preview was silently activating
#     experimental rules on every Ruff release, causing phantom violations.
# ============================================================================
[tool.ruff]
line-length = 100
target-version = "py311"

# First-party source roots — resolves `from core.xxx import ...` correctly.
# gaia/ added 2026-06-10: was missing, causing F821/import-classification
# errors when ruff linted gaia/ files that import from core or gaia itself.
src = [".", "core", "src-python", "gaia"]

# Dirs never linted (generated, vendored, notebooks, migrations)
extend-exclude = [
  ".venv",
  "venv",
  "__pycache__",
  "*.egg-info",
  "dist",
  "build",
  "migrations",
  "*.ipynb",
  "canon/generated",
  "core/canon/generated",
]

[tool.ruff.lint]
# Rule sets — signal-ordered for GAIA-OS
# E/W  — pycodestyle errors/warnings
# F    — Pyflakes (unused imports, undefined names)
# I    — isort (import ordering)
# N    — pep8-naming
# B    — flake8-bugbear (likely bugs)
# C4   — flake8-comprehensions
# SIM  — flake8-simplify
# UP   — pyupgrade (modernise syntax — selectively ignored below)
# S    — flake8-bandit (security)
# RUF  — Ruff-native rules
# PL   — Pylint-equivalent (complexity, convention, refactor, error)
select = ["E", "W", "F", "I", "N", "B", "C4", "SIM", "UP", "S", "RUF", "PL"]

# preview = false (default) — stable rules only. Do NOT re-enable without a
# full triage pass; preview rules activate silently on every Ruff version bump.

ignore = [
  # ── Style / formatting ──────────────────────────────────────────────
  "E501",   # line too long — formatter handles; canon docs need the space

  # ── Unused imports ──────────────────────────────────────────────────
  # F401: many imports are conditional (try/except), re-exported, or used
  # at runtime via importlib. Suppressed globally during active refactoring.
  "F401",

  # ── Import ordering (isort) ─────────────────────────────────────────
  # I001: import block sorting — codebase uses intentional grouping with
  # comments and conditional blocks. Auto-sort would break crypto/optional
  # import guards. Enable per-module when ready for migration sprint.
  "I001",

  # ── Type annotation modernisation (UP) ──────────────────────────────
  # Entire codebase uses Python 3.9-era typing. Cosmetic, not bugs.
  "UP003",  # type() for raising exceptions — cosmetic
  "UP006",  # List/Dict/Tuple → list/dict/tuple
  "UP007",  # Optional[X]/Union[X,Y] → X|None / X|Y
  "UP015",  # unnecessary open() mode argument — cosmetic
  "UP017",  # timezone.utc → datetime.UTC  (hundreds of instances)
  "UP035",  # typing imports deprecated in 3.9+
  "UP037",  # quoted type annotations
  # UP038 removed from ruff 0.4.x — dropped 2026-06-10
  "UP042",  # class X(str, Enum) → StrEnum  (suppress until migration sprint)
  "UP045",  # Optional[X] → X|None  (~800 instances)

  # ── Annotation rules ────────────────────────────────────────────────
  # ANN101/ANN102 removed from ruff 0.2.x — dropped 2026-06-10
  "ANN001", "ANN002", "ANN003",
  "ANN201", "ANN202", "ANN204", "ANN205", "ANN206",

  # ── Naming ──────────────────────────────────────────────────────────
  # N806: uppercase variable in function — physics/cache constants intentional
  # N818: exception names — domain names like ConstitutionViolation intentional
  "N806",
  "N818",

  # ── Bugbear ─────────────────────────────────────────────────────────
  "B008",   # Depends() in default args — standard FastAPI dependency injection
  "B904",   # raise X inside except without `from` — suppressed during active dev
  "B905",   # zip() without strict= — too noisy during rapid iteration

  # ── Simplify ────────────────────────────────────────────────────────
  "SIM105", # contextlib.suppress — try/except/pass is explicit and intentional
  "SIM108", # ternary vs if-else — explicit form clearer in multi-branch logic

  # ── Security ────────────────────────────────────────────────────────
  "S101",   # assert — soul-layer runtime guards use assert intentionally
  "S104",   # bind to all interfaces — intentional in CLI serve command
  "S110",   # try/except/pass — suppressed globally; matches SIM105 intent
  "S311",   # random — field modelling, not cryptography

  # ── Ruff-native ─────────────────────────────────────────────────────
  "RUF001", # ambiguous unicode in strings (EN DASH) — intentional in UX copy
  "RUF002", # ambiguous unicode in docstrings — intentional in documentation
  "RUF003", # ambiguous unicode in comments — intentional in physics/UX code
  "RUF012", # mutable class-var annotation — intentional in engine state containers
  "RUF013", # implicit Optional (e.g. x: str = None) — suppress until typing migration
  "RUF021", # ambiguous and/or chaining — explicit form preferred in soul-layer logic
  "RUF022", # __all__ not sorted — section comments make ordering intentional
  "RUF059", # unpacked variable unused — too noisy in router pattern matching

  # ── Pylint: import placement ─────────────────────────────────────────
  # PLC0415: import inside function — used for lazy/conditional loading
  "PLC0415",

  # ── Pylint complexity ────────────────────────────────────────────────
  "PLR0911", # too many return statements — soul-layer waterfall functions
  "PLR0912", # too many branches
  "PLR0913", # too many arguments
  "PLR0915", # too many statements
  "PLR2004", # magic value comparison — physics/resonance constants are fine
  "PLW0603", # global statement — used in singleton engine patterns
  "PLW2901", # for-loop variable overwrite — intentional strip/rstrip patterns
]

[tool.ruff.lint.per-file-ignores]
# ── Init files: wildcard re-exports are intentional ─────────────────────────
"**/__init__.py" = ["F401", "F403", "F811"]

# ── Test files: asserts required, bandit too strict for fixtures ─────────────
"tests/**/*.py"                = ["S101", "S105", "S106", "S311", "ANN", "D", "N802", "F401"]
"tests/soul_mirror/**/*.py"    = ["S101", "S105", "S106", "S311", "ANN", "D", "N802", "F401"]
"tests/governance/**/*.py"     = ["S101", "S105", "S106", "S311", "ANN", "D", "N802", "F401"]

# ── Quantum chemistry: research code, pyscf/qiskit imports are conditional ───
"src-python/quantum_chemistry/**/*.py" = ["F401", "F811", "S101", "N803", "N806"]
"src-python/sovereign_memory/**/*.py" = ["F401", "F811"]
"src-python/**/__init__.py"           = ["F401", "F403", "F811"]

# ── API layer: re-exports + conditional imports are intentional ──────────────
"api/**/*.py" = ["F401"]

# ── Core compatibility shim files (wildcard re-export bridges) ───────────────
# These files intentionally use `from x import *` to re-export entire modules
# under legacy names. F401/F403 are correct here and must not be removed.
"core/rate_limiter.py"     = ["F401", "F403"]
"core/memory_store.py"     = ["F401", "F403"]
"core/server_state.py"     = ["F401", "F403"]
"core/server_models.py"    = ["F401", "F403"]
"core/memory_chroma.py"    = ["F401", "F403"]
"core/session_memory.py"   = ["F401", "F403"]
"core/primary_thread.py"   = ["F401", "F403"]
"core/integration_engine.py" = ["F401", "F403"]
"core/growth_arc_engine.py"  = ["F401", "F403"]
"core/somatic_profile_engine.py" = ["F401", "F403"]
"core/coherence_field_engine.py" = ["F401", "F403"]
"core/collective_signal_layer.py" = ["F401", "F403"]
"core/phase_state_monitor.py"   = ["F401", "F403"]
"core/system_health_engine.py"  = ["F401", "F403"]

# ── Core modules with conditional/guarded imports ───────────────────────────
"core/codex_stage_engine.py"        = ["F401"]
"core/crystal_mineral_database.py"  = ["F401"]
"core/gcp_sensor.py"                = ["F401"]
"core/governance/explainability.py" = ["F401"]
"core/governance/halt_controller.py" = ["F401"]

# ── Soul-layer / consciousness / resonance engines ───────────────────────────
# Multi-branch state machines, emotional arc logic, symbolic pattern matching.
# High McCabe complexity is intentional, not a bug.
"core/soul_mirror_engine.py"     = ["C901", "PLR0912", "PLR0915"]
"core/shadow_integration.py"     = ["C901", "PLR0912", "PLR0915"]
"core/shadow_engine.py"          = ["C901", "PLR0912", "PLR0915"]
"core/transpersonal_engine.py"   = ["C901", "PLR0912", "PLR0915"]
"core/individuation.py"          = ["C901", "PLR0912", "PLR0915"]
"core/dream_weaver.py"           = ["C901", "PLR0912", "PLR0915"]
