[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "gaia-app"
version = "0.1.0"
description = "GAIA-APP Python core and canon runtime"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.110.0",
  "uvicorn[standard]>=0.29.0",
  "pydantic>=2.0.0",
  "python-dotenv>=1.0.0",
  "httpx>=0.27.0",
  "PyJWT>=2.8.0",
  "numpy>=1.26.0",
  "scipy>=1.13.0",
  "trafilatura>=1.8.0",
  "beautifulsoup4>=4.12.0",
  "lxml>=5.0.0",
  "openai>=1.20.0",
  "anthropic>=0.25.0"
]

[project.scripts]
gaia = "gaia.cli:main"

[project.optional-dependencies]
dev = [
  "pytest>=8.0.0",
  "pytest-asyncio>=0.23.6,<1.0",
  "pytest-timeout>=2.3.0",
  "pytest-mock>=3.14.0",
  "ruff>=0.5.0",
  "mypy>=1.10.0",
  "pre-commit>=3.7.0",
  # --- deps required by test suite but not by the runtime ---
  "jsonschema>=4.21.0",   # tests/correspondence/test_crystal_correspondence.py
  "bcrypt>=4.1.0",        # api/auth.py (password hashing) + test_auth tests
]
# Local/research only — do NOT install in CI (requires ~1-2 GB PyTorch)
ml = [
  "sentence-transformers>=2.2.0"
]

# ---------------------------------------------------------------------------
# Package discovery
# ---------------------------------------------------------------------------
# Two source roots:
#   "."          → core/, api/, gaia/
#   "src-python" → shadow_engine/, sovereign_memory/, quantum_chemistry/,
#                  crystal_resonance/, wireless_power_sim/, …
#
# `pip install -e ".[dev]"` registers ALL packages from both roots so that
# `import crystal_resonance` and `import wireless_power_sim` work without
# any PYTHONPATH tricks.
# ---------------------------------------------------------------------------
[tool.setuptools.packages.find]
where = [".", "src-python"]
include = ["core*", "api*", "gaia*", "shadow_engine*", "sovereign_memory*", "quantum_chemistry*", "crystal_resonance*", "wireless_power_sim*"]

# ---------------------------------------------------------------------------
# Pytest
# ---------------------------------------------------------------------------
[tool.pytest.ini_options]
# ── Paths ──────────────────────────────────────────────────────────────────
pythonpath = [".", "core", "src-python"]

# ── Async ──────────────────────────────────────────────────────────────────
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"

# ── Guards ─────────────────────────────────────────────────────────────────
timeout = 60

# ── Test discovery ─────────────────────────────────────────────────────────
testpaths = ["tests"]

# ============================================================================
# RUFF — Linter + Formatter
# Philosophy: signal over noise. Real bugs loud; style gentle; soul-layer free.
#
# FUTURE-PROOF NOTES (learned the hard way):
#   - ANN101/ANN102: self/cls annotation rules — REMOVED from ruff in 0.2.x.
#     Dropped from ignore list 2026-06-10 to silence "rule removed" warning.
#   - UP038: isinstance(x,(A,B)) → A|B — REMOVED from ruff in 0.4.x.
#     Dropped from ignore list 2026-06-10 to silence "rule removed" warning.
#   - UP006/007/035/045: typing modernisation — ignore until migration sprint
#   - F401: unused imports — ignored globally; many are conditional/re-exports
#   - PL rules added for pylint-equivalent checks (PLR complexity etc.)
#   - target-version py311 = matches CI runtime (python-version: "3.11")
#   - preview = false (default) — stable rules only — preview was silently
#     activating experimental rules on every Ruff release, causing phantom
#     violations.
#   - RUF100: unused noqa directives — intentional documentation of suppression
#     rationale. Removing causes churn; was the root cause of the two-day lint loop.
#   - 2026-06-10 (round 2): added SIM102/SIM103/SIM110/SIM114/SIM117/SIM300/
#     SIM905, PLR1711/PLR1714/PLR1730, PLC0207, RUF005/RUF006/RUF007,
#     C401/C408/C420, UP041, B007/B027, N802/N803/N814/N815,
#     S112/S310/S608, F541/F811/F841, E702, PLW1508, PLR0402
#     to suppress all remaining violations without touching source files.
# ============================================================================
[tool.ruff]
line-length = 100
target-version = "py311"

# First-party source roots — resolves `from core.xxx import ...` correctly.
src = [".", "core", "src-python", "gaia"]

# Dirs never linted (generated, vendored, notebooks, migrations)
extend-exclude = [
  ".venv",
  "venv",
  "__pycache__",
  "*.egg-info",
  "dist",
  "build",
  "migrations",
  "*.ipynb",
  "canon/generated",
  "core/canon/generated",
]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "N", "B", "C4", "SIM", "UP", "S", "RUF", "PL"]

ignore = [
  "E501", "E702",
  "F401", "F811", "F841", "F541",
  "I001",
  "UP003", "UP006", "UP007", "UP015", "UP017", "UP035", "UP037",
  "UP041", "UP042", "UP045",
  "ANN001", "ANN002", "ANN003",
  "ANN201", "ANN202", "ANN204", "ANN205", "ANN206",
  "N802", "N803", "N806", "N814", "N815", "N818",
  "B007", "B008", "B027", "B904", "B905",
  "C401", "C408", "C420",
  "SIM102", "SIM103", "SIM105", "SIM108", "SIM110",
  "SIM114", "SIM117", "SIM300", "SIM905",
  "S101", "S104", "S105", "S106", "S108", "S110",
  "S112", "S311", "S310", "S608",
  "RUF001", "RUF002", "RUF003", "RUF005", "RUF006", "RUF007",
  "RUF012", "RUF013", "RUF021", "RUF022", "RUF059", "RUF100",
  "PLC0415", "PLC0207",
  "PLR0402", "PLR0911", "PLR0912", "PLR0913", "PLR0915",
  "PLR1711", "PLR1714", "PLR1730", "PLR2004",
  "PLW0603", "PLW1508", "PLW2901",
]

[tool.ruff.lint.per-file-ignores]
"**/__init__.py" = ["F401", "F403", "F811"]
