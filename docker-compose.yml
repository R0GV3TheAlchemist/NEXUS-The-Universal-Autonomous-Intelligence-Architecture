# =============================================================================
# GAIA OS — Docker Compose
#
# Services:
#   gaia      — The GAIA OS HTTP server
#   gaia-cli  — One-shot CLI container (profile: cli)
#
# Quick start:
#   docker compose up
#
# With auth enabled:
#   GAIA_BEARER_TOKENS=my-token docker compose up
#
# Run the CLI against the running server:
#   (Not yet — CLI talks to the in-process API.
#    HTTP CLI client coming in a future layer.)
# =============================================================================
version: "3.9"

services:

  gaia:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: gaia-os:latest
    container_name: gaia-os
    restart: unless-stopped
    ports:
      - "${GAIA_PORT:-8000}:${GAIA_PORT:-8000}"
    environment:
      GAIA_ROOT: /data/gaia
      GAIA_HOST: 0.0.0.0
      GAIA_PORT: ${GAIA_PORT:-8000}
      GAIA_RELOAD: ${GAIA_RELOAD:-false}
      GAIA_BEARER_TOKENS: ${GAIA_BEARER_TOKENS:-}
      GAIA_CORS_ORIGINS: ${GAIA_CORS_ORIGINS:-*}
      GAIA_BOOT_NUMBER: ${GAIA_BOOT_NUMBER:-1}
      GAIA_WORKERS: ${GAIA_WORKERS:-1}
    volumes:
      # Named volume — GAIAN homes + memory survive container restarts
      - gaia-data:/data/gaia
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import urllib.request
          urllib.request.urlopen('http://localhost:${GAIA_PORT:-8000}/health').read()
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - gaia-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Optional: nginx reverse proxy
  # Uncomment to serve GAIA behind nginx with TLS termination.
  # ---------------------------------------------------------------------------
  # nginx:
  #   image: nginx:alpine
  #   container_name: gaia-nginx
  #   ports:
  #     - "443:443"
  #     - "80:80"
  #   volumes:
  #     - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./deploy/nginx/certs:/etc/nginx/certs:ro
  #   depends_on:
  #     gaia:
  #       condition: service_healthy
  #   networks:
  #     - gaia-net

volumes:
  gaia-data:
    driver: local

networks:
  gaia-net:
    driver: bridge
